<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>
    <script src="config.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_URL = config.API_URL;

        function formatValidationErrors(errors) {
          if (!errors || typeof errors !== 'object') return ''
          return Object.entries(errors)
            .flatMap(([field, messages]) => {
              const label = field.replace(/_/g, ' ')
              const normalized = Array.isArray(messages) ? messages : [messages]
              return normalized.map(message => `${label}: ${message}`)
            })
            .join(' ')
        }

        function getErrorMessage(payload, fallback) {
          const validationMessage = formatValidationErrors(payload?.errors)
          if (validationMessage) return validationMessage
          if (payload?.error) return payload.error
          return fallback
        }

        async function readErrorMessage(response, fallback) {
          try {
            const payload = await response.json()
            return getErrorMessage(payload, fallback)
          } catch {
            return fallback
          }
        }

        function CommentsPanel({ taskId }) {
          const [comments, setComments] = useState([])
          const [author, setAuthor] = useState('')
          const [content, setContent] = useState('')
          const [editing, setEditing] = useState(null)
          const [loading, setLoading] = useState(false)
          const [error, setError] = useState('')
          const base = `${API_URL}/api/tasks/${taskId}/comments`

          useEffect(() => {
            let ignore = false
            setLoading(true)
            setError('')
            fetch(base)
              .then(async response => {
                if (!response.ok) {
                  throw new Error(await readErrorMessage(response, 'Failed to load comments'))
                }
                return response.json()
              })
              .then(data => {
                if (!ignore) setComments(Array.isArray(data) ? data : [])
              })
              .catch(err => {
                if (!ignore) {
                  setComments([])
                  setError(err.message || 'Failed to load comments')
                }
              })
              .finally(() => {
                if (!ignore) setLoading(false)
              })
            return () => {
              ignore = true
            }
          }, [taskId])

          async function addComment(e) {
            e.preventDefault()
            const trimmedAuthor = author.trim()
            const trimmedContent = content.trim()
            if (!trimmedAuthor || !trimmedContent) {
              setError('Author and comment are required')
              return
            }
            setError('')
            setLoading(true)
            try {
              const res = await fetch(base, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({author: trimmedAuthor, content: trimmedContent})})
              if(res.ok){ const c = await res.json(); setComments(prev => [...prev, c]); setAuthor(''); setContent('') }
              else { setError(await readErrorMessage(res, 'Failed to add comment')) }
            } catch { setError('Network error') }
            setLoading(false)
          }

          async function saveEdit() {
            const trimmedAuthor = editing.author.trim()
            const trimmedContent = editing.content.trim()
            if (!trimmedAuthor || !trimmedContent) {
              setError('Author and comment are required')
              return
            }
            setError('')
            setLoading(true)
            try {
              const res = await fetch(`${base}/${editing.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...editing, author: trimmedAuthor, content: trimmedContent})})
              if(res.ok){ const updated = await res.json(); setComments(prev=>prev.map(c=>c.id===updated.id?updated:c)); setEditing(null) }
              else { setError(await readErrorMessage(res, 'Failed to update comment')) }
            } catch { setError('Network error') }
            setLoading(false)
          }

          async function remove(id) {
            if(!window.confirm('Delete this comment?')) return
            setError('')
            setLoading(true)
            try {
              const res = await fetch(`${base}/${id}`, {method:'DELETE'})
              if(res.status===204) setComments(prev=>prev.filter(c=>c.id!==id))
              else setError('Failed to delete comment')
            } catch { setError('Network error') }
            setLoading(false)
          }

          return <div className="comments-section">
            <h4><i className="fas fa-comments"></i> Comments</h4>
            {error && <div className="error-msg">{error}</div>}
            {loading && <div className="loading">Loading...</div>}
            {!loading && comments.length === 0 && <div className="empty-state">No comments yet. Start the conversation.</div>}
            {comments.map(c=><div key={c.id} className="comment-item">
              <div className="comment-author"><i className="fas fa-user"></i> {c.author}</div>
              <div className="comment-content">{c.content}</div>
              <div className="comment-actions">
                <button className="btn btn-secondary" onClick={()=>setEditing(c)} disabled={loading}><i className="fas fa-edit"></i> Edit</button>
                <button className="btn btn-danger" onClick={()=>remove(c.id)} disabled={loading}><i className="fas fa-trash"></i> Delete</button>
              </div>
            </div>)}
            {editing ? <div className="edit-form">
              <div className="form-group">
                <label>Author</label>
                <input className="form-control" value={editing.author} onChange={e=>setEditing({...editing,author:e.target.value})} maxLength="120"/>
              </div>
              <div className="form-group">
                <label>Comment</label>
                <textarea className="form-control" value={editing.content} onChange={e=>setEditing({...editing,content:e.target.value})} maxLength="1000"/>
              </div>
              <button className="btn btn-primary" onClick={saveEdit} disabled={loading}><i className="fas fa-save"></i> Save</button>
              <button className="btn btn-secondary" onClick={()=>setEditing(null)} disabled={loading}><i className="fas fa-times"></i> Cancel</button>
            </div>
            : <form onSubmit={addComment}>
                <div className="form-group">
                  <label>Author</label>
                  <input className="form-control" value={author} onChange={e=>setAuthor(e.target.value)} placeholder='Your name' maxLength="120" required/>
                </div>
                <div className="form-group">
                  <label>Comment</label>
                  <textarea className="form-control" value={content} onChange={e=>setContent(e.target.value)} placeholder='Write your comment...' maxLength="1000" required/>
                </div>
                <button type='submit' className="btn btn-primary" disabled={loading}><i className="fas fa-plus"></i> Add Comment</button>
              </form>}
          </div>
        }

        function TaskList(){
          const [tasks, setTasks] = useState([])
          const [title, setTitle] = useState('')
          const [description, setDescription] = useState('')
          const [status, setStatus] = useState('pending')
          const [priority, setPriority] = useState('medium')
          const [selected, setSelected] = useState(null)
          const [editingTask, setEditingTask] = useState(null)
          const [loading, setLoading] = useState(false)
          const [error, setError] = useState('')
          const [filterStatus, setFilterStatus] = useState('')
          const [filterPriority, setFilterPriority] = useState('')
          const base = `${API_URL}/api`

          useEffect(()=>{ 
            let ignore = false
            setLoading(true)
            setError('')
            let url = `${base}/tasks`
            const params = new URLSearchParams()
            if(filterStatus) params.append('status', filterStatus)
            if(filterPriority) params.append('priority', filterPriority)
            if(params.toString()) url += '?' + params.toString()
            
            fetch(url)
              .then(async response => {
                if (!response.ok) {
                  throw new Error(await readErrorMessage(response, 'Failed to load tasks'))
                }
                return response.json()
              })
              .then(data=>{
                if (!ignore) setTasks(Array.isArray(data.tasks) ? data.tasks : [])
              })
              .catch((err)=>{
                if (!ignore) {
                  setTasks([])
                  setError(err.message || 'Failed to load tasks')
                }
              })
              .finally(() => {
                if (!ignore) setLoading(false)
              })
            return () => {
              ignore = true
            }
          },[filterStatus, filterPriority])

          useEffect(() => {
            if (selected && !tasks.some(task => task.id === selected.id)) {
              setSelected(null)
            }
          }, [tasks, selected])

          async function addTask(e){
            e.preventDefault()
            const trimmedTitle = title.trim()
            if (!trimmedTitle) {
              setError('Task title is required')
              return
            }
            setError('')
            setLoading(true)
            try {
              const res = await fetch(`${base}/tasks`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title: trimmedTitle, description: description.trim(), status, priority})})
              if(res.ok){ const t = await res.json(); setTasks(prev => [t, ...prev]); setTitle(''); setDescription(''); setStatus('pending'); setPriority('medium') }
              else { setError(await readErrorMessage(res, 'Failed to add task')) }
            } catch { setError('Network error') }
            setLoading(false)
          }

          async function saveEdit() {
            if (!editingTask.title.trim()) {
              setError('Title cannot be empty')
              return
            }
            setError('')
            setLoading(true)
            try {
              const updateData = { title: editingTask.title.trim(), description: (editingTask.description || '').trim(), status: editingTask.status, priority: editingTask.priority }
              const res = await fetch(`${base}/tasks/${editingTask.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updateData)})
              if(res.ok){
                const updated = await res.json()
                setTasks(prev=>prev.map(t=>t.id===updated.id?updated:t))
                setSelected(prev => prev && prev.id === updated.id ? updated : prev)
                setEditingTask(null)
              }
              else { setError(await readErrorMessage(res, 'Failed to update task')) }
            } catch { setError('Network error') }
            setLoading(false)
          }

          async function deleteTask(id){
            if(!window.confirm('Are you sure you want to delete this task?')) return
            setError('')
            setLoading(true)
            try {
              const res = await fetch(`${base}/tasks/${id}`, {method:'DELETE'})
              if(res.status===204) {
                setTasks(prev => prev.filter(t=>t.id!==id))
                if(selected && selected.id === id) setSelected(null)
              } else setError('Failed to delete task')
            } catch { setError('Network error') }
            setLoading(false)
          }

          const statusColors = {pending:'#fbbf24',"in-progress":'#3b82f6',completed:'#10b981'}
          const priorityColors = {low:'#6b7280',medium:'#f59e0b',high:'#ef4444'}

          return <div className="container">
            <div className="header">
              <h1><i className="fas fa-tasks"></i> Task Manager</h1>
            </div>
            {error && <div className="error-msg">{error}</div>}
            <div className={`grid ${selected ? 'two-column' : 'one-column'}`}>
              <div className="card">
                <h2><i className="fas fa-list-check"></i> Tasks</h2>
                <div className="filters">
                  <select className="form-control" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                  </select>
                  <select className="form-control" value={filterPriority} onChange={e=>setFilterPriority(e.target.value)}>
                    <option value="">All Priority</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                  </select>
                </div>
                <form onSubmit={addTask}>
                  <div className="form-group">
                    <label>Task Title</label>
                    <input className="form-control" value={title} onChange={e=>setTitle(e.target.value)} placeholder='Enter new task...' maxLength="200" required/>
                  </div>
                  <div className="form-group">
                    <label>Description</label>
                    <textarea className="form-control" value={description} onChange={e=>setDescription(e.target.value)} placeholder='Task description...' maxLength="2000"/>
                  </div>
                  <div className="form-row">
                    <div className="form-group">
                      <label>Status</label>
                      <select className="form-control" value={status} onChange={e=>setStatus(e.target.value)}>
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                      </select>
                    </div>
                    <div className="form-group">
                      <label>Priority</label>
                      <select className="form-control" value={priority} onChange={e=>setPriority(e.target.value)}>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                      </select>
                    </div>
                  </div>
                  <button type='submit' className="btn btn-primary" disabled={loading}><i className="fas fa-plus"></i> Add Task</button>
                </form>
                {loading && <div className="loading">Loading...</div>}
                {!loading && tasks.length === 0 && <div className="empty-state">No tasks match these filters yet.</div>}
                <div className="task-list">
                  {tasks.map(t=><div key={t.id} className="task-item">
                    {editingTask && editingTask.id === t.id ? (
                      <div className="edit-form">
                        <input className="form-control" value={editingTask.title} onChange={e=>setEditingTask({...editingTask, title:e.target.value})} maxLength="200"/>
                        <textarea className="form-control" value={editingTask.description||''} onChange={e=>setEditingTask({...editingTask, description:e.target.value})} placeholder="Description" maxLength="2000"/>
                        <div className="form-row">
                          <select className="form-control" value={editingTask.status} onChange={e=>setEditingTask({...editingTask, status:e.target.value})}>
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                          </select>
                          <select className="form-control" value={editingTask.priority} onChange={e=>setEditingTask({...editingTask, priority:e.target.value})}>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                          </select>
                        </div>
                        <div className="task-actions">
                          <button className="btn btn-primary" onClick={saveEdit} disabled={loading}><i className="fas fa-save"></i> Save</button>
                          <button className="btn btn-secondary" onClick={()=>setEditingTask(null)} disabled={loading}><i className="fas fa-times"></i> Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <>
                        <div className="task-info">
                          <span className="task-title">{t.title}</span>
                          {t.description && <p className="task-desc">{t.description}</p>}
                          <div className="task-badges">
                            <span className="badge" style={{backgroundColor:statusColors[t.status]}}>{t.status}</span>
                            <span className="badge" style={{backgroundColor:priorityColors[t.priority]}}>{t.priority}</span>
                          </div>
                        </div>
                        <div className="task-actions">
                          <button className="btn btn-secondary" style={{padding: '6px 12px', fontSize: '14px'}} onClick={()=>setEditingTask(t)} disabled={loading} title="Edit task"><i className="fas fa-pencil-alt"></i></button>
                          <button className="btn btn-primary" onClick={e=>{e.preventDefault(); setSelected(t)}} disabled={loading}><i className="fas fa-comments"></i> Comments</button>
                          <button className="btn btn-danger" onClick={()=>deleteTask(t.id)} disabled={loading}><i className="fas fa-trash"></i> Delete</button>
                        </div>
                      </>
                    )}
                  </div>)}
                </div>
              </div>
              {selected && <div className="card">
                <h3><i className="fas fa-sticky-note"></i> Task: {selected.title}</h3>
                <CommentsPanel taskId={selected.id}/>
              </div>}
            </div>
          </div>
        }

        function App() {
            return <TaskList />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
